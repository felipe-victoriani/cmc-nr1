<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empresas | CMV Contabilidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
  </head>
  <body class="app-layout">
    <a href="#mainContent" class="skip-link">Ir para o conteúdo principal</a>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"
              />
            </svg>
          </div>
          <span class="brand-name">CMV Contabilidade</span>
        </div>
        <button
          class="sidebar-close-btn"
          id="sidebarClose"
          aria-label="Fechar menu"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="20"
            height="20"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebarUser"></div>
      </div>
    </aside>

    <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

    <div class="main-wrapper" id="mainWrapper">
      <header class="topbar">
        <div class="topbar-left">
          <button
            class="topbar-menu-btn icon-btn"
            id="topbarMenuBtn"
            aria-label="Menu"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="20"
              height="20"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
        </div>
        <div class="topbar-right">
          <div class="topbar-user" id="topbarUser"></div>
        </div>
      </header>

      <main class="main-content" id="mainContent">
        <div class="page-header">
          <div>
            <h1 class="page-title">Empresas</h1>
            <p class="page-subtitle">
              Gerencie as empresas cadastradas no sistema
            </p>
          </div>
          <button class="btn btn-primary" id="btnNew">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="16"
              height="16"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Nova Empresa
          </button>
        </div>

        <!-- Toolbar -->
        <div
          class="toolbar"
          style="
            display: flex;
            gap: var(--sp-3);
            flex-wrap: wrap;
            margin-bottom: var(--sp-4);
          "
        >
          <div class="input-wrapper" style="flex: 1; min-width: 220px">
            <svg
              class="input-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="search"
              class="form-control"
              id="searchInput"
              placeholder="Buscar por nome ou CNPJ…"
            />
          </div>
          <select class="form-control" id="filterStatus" style="width: 160px">
            <option value="">Todos os status</option>
            <option value="active">Ativa</option>
            <option value="inactive">Inativa</option>
          </select>
          <select class="form-control" id="filterRisk" style="width: 180px">
            <option value="">Todos os graus de risco</option>
            <option value="1">Grau 1</option>
            <option value="2">Grau 2</option>
            <option value="3">Grau 3</option>
            <option value="4">Grau 4</option>
          </select>
        </div>

        <!-- Tabela -->
        <div class="card">
          <div class="table-wrapper" id="tableWrapper">
            <!-- Renderizado por empresas.js -->
          </div>
          <div
            class="card-footer"
            id="paginationContainer"
            style="display: none"
          ></div>
        </div>
      </main>
    </div>

    <div
      class="toast-container"
      id="toastContainer"
      aria-live="polite"
      role="status"
    ></div>
    <div class="modal-backdrop hidden" id="modalBackdrop"></div>
    <div class="global-loader hidden" id="globalLoader">
      <div class="spinner spinner-lg"></div>
    </div>

    <!-- Modal Empresa -->
    <template id="tplModalEmpresa">
      <div class="form-grid form-grid-2">
        <div class="form-group" id="g-name">
          <label class="form-label"
            >Razão Social <span class="required">*</span></label
          >
          <input
            type="text"
            class="form-control"
            name="name"
            placeholder="Nome completo da empresa"
          />
          <span class="form-error">Campo obrigatório.</span>
        </div>
        <div class="form-group" id="g-tradeName">
          <label class="form-label">Nome Fantasia</label>
          <input
            type="text"
            class="form-control"
            name="tradeName"
            placeholder="Nome fantasia"
          />
        </div>
        <div class="form-group" id="g-cnpj">
          <label class="form-label">CNPJ <span class="required">*</span></label>
          <input
            type="text"
            class="form-control"
            name="cnpj"
            placeholder="00.000.000/0000-00"
            data-mask="cnpj"
          />
          <span class="form-error">CNPJ inválido.</span>
        </div>
        <div class="form-group" id="g-cnae">
          <label class="form-label">CNAE Principal</label>
          <input
            type="text"
            class="form-control"
            name="cnae"
            placeholder="0000-0/00"
          />
        </div>
        <div class="form-group" id="g-riskGrade">
          <label class="form-label"
            >Grau de Risco (NR-4) <span class="required">*</span></label
          >
          <select class="form-control" name="riskGrade">
            <option value="">Selecione</option>
            <option value="1">Grau 1 – Baixo</option>
            <option value="2">Grau 2 – Médio</option>
            <option value="3">Grau 3 – Alto</option>
            <option value="4">Grau 4 – Muito Alto</option>
          </select>
          <span class="form-error">Campo obrigatório.</span>
        </div>
        <div class="form-group" id="g-segment">
          <label class="form-label">Segmento / Ramo</label>
          <input
            type="text"
            class="form-control"
            name="segment"
            placeholder="Ex: Construção civil, Saúde…"
          />
        </div>
        <div class="form-group" id="g-phone">
          <label class="form-label">Telefone</label>
          <input
            type="text"
            class="form-control"
            name="phone"
            placeholder="(00) 00000-0000"
            data-mask="phone"
          />
        </div>
        <div class="form-group" id="g-email">
          <label class="form-label">E-mail</label>
          <input
            type="email"
            class="form-control"
            name="email"
            placeholder="contato@empresa.com.br"
          />
          <span class="form-error">E-mail inválido.</span>
        </div>
        <div class="form-group col-span-full" id="g-street">
          <label class="form-label">Endereço</label>
          <input
            type="text"
            class="form-control"
            name="street"
            placeholder="Rua, Avenida…"
          />
        </div>
        <div class="form-group" id="g-number">
          <label class="form-label">Número</label>
          <input
            type="text"
            class="form-control"
            name="number"
            placeholder="Nº"
          />
        </div>
        <div class="form-group" id="g-complement">
          <label class="form-label">Complemento</label>
          <input
            type="text"
            class="form-control"
            name="complement"
            placeholder="Sala, Andar…"
          />
        </div>
        <div class="form-group" id="g-neighborhood">
          <label class="form-label">Bairro</label>
          <input
            type="text"
            class="form-control"
            name="neighborhood"
            placeholder="Bairro"
          />
        </div>
        <div class="form-group" id="g-city">
          <label class="form-label">Cidade</label>
          <input
            type="text"
            class="form-control"
            name="city"
            placeholder="Cidade"
          />
        </div>
        <div class="form-group" id="g-state">
          <label class="form-label">Estado</label>
          <select class="form-control" name="state">
            <option value="">UF</option>
            <option>AC</option>
            <option>AL</option>
            <option>AP</option>
            <option>AM</option>
            <option>BA</option>
            <option>CE</option>
            <option>DF</option>
            <option>ES</option>
            <option>GO</option>
            <option>MA</option>
            <option>MT</option>
            <option>MS</option>
            <option>MG</option>
            <option>PA</option>
            <option>PB</option>
            <option>PR</option>
            <option>PE</option>
            <option>PI</option>
            <option>RJ</option>
            <option>RN</option>
            <option>RS</option>
            <option>RO</option>
            <option>RR</option>
            <option>SC</option>
            <option>SP</option>
            <option>SE</option>
            <option>TO</option>
          </select>
        </div>
        <div class="form-group" id="g-cep">
          <label class="form-label">CEP</label>
          <input
            type="text"
            class="form-control"
            name="cep"
            placeholder="00000-000"
            data-mask="cep"
          />
        </div>
        <div class="form-group" id="g-status">
          <label class="form-label">Status</label>
          <select class="form-control" name="status">
            <option value="active">Ativa</option>
            <option value="inactive">Inativa</option>
          </select>
        </div>
      </div>
    </template>

    <script type="module" src="assets/js/empresas.js"></script>
  </body>
</html>
