<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incidentes · CMV Contabilidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  </head>
  <body>
    <a href="#mainContent" class="skip-link">Ir para o conteúdo principal</a>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon"
            ><svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg
          ></span>
          <span class="brand-name">CMV Contabilidade</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user" id="sidebarUser"></div>
        </div>
        <button
          class="sidebar-close-btn"
          id="sidebarClose"
          aria-label="Fechar menu"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="20"
            height="20"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </aside>
      <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

      <div class="main-wrapper" id="mainWrapper">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-btn"
              id="topbarMenuBtn"
              aria-label="Menu"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <nav
              class="breadcrumb"
              id="breadcrumb"
              aria-label="Breadcrumb"
            ></nav>
          </div>
          <div class="topbar-right">
            <div class="topbar-user" id="topbarUser"></div>
          </div>
        </header>

        <main class="main-content" id="mainContent">
          <div class="page-header">
            <div>
              <h1 class="page-title">Incidentes e Acidentes</h1>
              <p class="page-subtitle">
                Registro e investigação de ocorrências de segurança do trabalho
              </p>
            </div>
            <div style="display: flex; gap: var(--sp-2)">
              <button class="btn btn-secondary" id="btnExport">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 16px; height: 16px"
                >
                  <path
                    d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"
                  />
                </svg>
                Exportar
              </button>
              <button class="btn btn-primary" id="btnNew">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 16px; height: 16px"
                >
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Registrar Incidente
              </button>
            </div>
          </div>

          <!-- Stats -->
          <div class="stats-grid" id="incidentSummary"></div>

          <!-- Filtros -->
          <div class="card" style="margin-bottom: var(--sp-4)">
            <div class="card-body" style="padding: var(--sp-3)">
              <div
                class="form-grid"
                style="grid-template-columns: 2fr 1fr 1fr 1fr"
              >
                <div class="form-group" style="margin: 0">
                  <div class="input-wrapper">
                    <span class="input-icon"
                      ><svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <circle cx="11" cy="11" r="8" />
                        <path d="M21 21l-4.35-4.35" /></svg
                    ></span>
                    <input
                      type="text"
                      class="form-control"
                      id="searchInput"
                      placeholder="Pesquisar incidentes..."
                    />
                  </div>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterType">
                    <option value="">Todos os Tipos</option>
                    <option value="near_miss">Quase Acidente</option>
                    <option value="minor_injury">Lesão Leve</option>
                    <option value="serious_injury">Lesão Grave</option>
                    <option value="fatal">Fatal</option>
                    <option value="property_damage">Dano Material</option>
                    <option value="environmental">Ambiental</option>
                  </select>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterStatus">
                    <option value="">Todos os Status</option>
                    <option value="open">Aberto</option>
                    <option value="investigating">Em Investigação</option>
                    <option value="closed">Encerrado</option>
                  </select>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterEstablishment">
                    <option value="">Todos os Estabelecimentos</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Tabela -->
          <div class="card">
            <div class="card-body" style="padding: 0">
              <div class="table-wrapper" id="tableWrapper"></div>
            </div>
            <div
              class="card-footer"
              id="paginationContainer"
              style="display: none"
            ></div>
          </div>
        </main>
      </div>
    </div>

    <!-- TEMPLATE MODAL -->
    <template id="tplModal">
      <div class="form-grid" style="gap: var(--sp-4)">
        <div style="grid-column: 1/-1">
          <p
            style="
              font-size: var(--text-sm);
              font-weight: var(--font-semi);
              color: var(--clr-text);
              border-bottom: 1px solid var(--clr-border);
              padding-bottom: var(--sp-2);
              margin-bottom: var(--sp-3);
            "
          >
            Dados da Ocorrência
          </p>
        </div>

        <div class="form-group">
          <label class="form-label">Tipo de Incidente *</label>
          <select class="form-control" name="incidentType">
            <option value="">Selecione...</option>
            <option value="near_miss">Quase Acidente</option>
            <option value="minor_injury">Lesão Leve</option>
            <option value="serious_injury">Lesão Grave</option>
            <option value="fatal">Fatal</option>
            <option value="property_damage">Dano Material</option>
            <option value="environmental">Ambiental</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Estabelecimento *</label>
          <select
            class="form-control"
            name="establishmentId"
            id="incidentModalEst"
          >
            <option value="">Selecione...</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Data e Hora *</label>
          <input
            type="datetime-local"
            class="form-control"
            name="incidentDate"
          />
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Local Exato</label>
          <input
            type="text"
            class="form-control"
            name="location"
            placeholder="Ex: Setor de Produção, Linha 3"
          />
        </div>

        <div class="form-group col-span-full">
          <label class="form-label">Descrição do Ocorrido *</label>
          <textarea
            class="form-control"
            name="description"
            rows="4"
            placeholder="Descreva como e quando ocorreu o incidente..."
          ></textarea>
          <span class="form-error"></span>
        </div>

        <div style="grid-column: 1/-1">
          <p
            style="
              font-size: var(--text-sm);
              font-weight: var(--font-semi);
              color: var(--clr-text);
              border-bottom: 1px solid var(--clr-border);
              padding-bottom: var(--sp-2);
              margin-bottom: var(--sp-3);
            "
          >
            Envolvidos e Danos
          </p>
        </div>

        <div class="form-group">
          <label class="form-label">Nome do Envolvido / Acidentado</label>
          <input
            type="text"
            class="form-control"
            name="involvedPerson"
            placeholder="Nome completo"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Parte do Corpo Afetada</label>
          <input
            type="text"
            class="form-control"
            name="bodyPart"
            placeholder="Ex: Mão direita, Pé esquerdo"
          />
        </div>

        <div class="form-group col-span-full">
          <label class="form-label">Danos Materiais / Equipamentos</label>
          <input
            type="text"
            class="form-control"
            name="materialDamage"
            placeholder="Descreva os danos causados"
          />
        </div>

        <div style="grid-column: 1/-1">
          <p
            style="
              font-size: var(--text-sm);
              font-weight: var(--font-semi);
              color: var(--clr-text);
              border-bottom: 1px solid var(--clr-border);
              padding-bottom: var(--sp-2);
              margin-bottom: var(--sp-3);
            "
          >
            Investigação e Ações
          </p>
        </div>

        <div class="form-group col-span-full">
          <label class="form-label">Causa Raiz / Análise</label>
          <textarea
            class="form-control"
            name="rootCause"
            rows="3"
            placeholder="Por que o incidente ocorreu? Causas imediatas e fundamentais..."
          ></textarea>
        </div>

        <div class="form-group col-span-full">
          <label class="form-label">Ações Corretivas</label>
          <textarea
            class="form-control"
            name="correctiveActions"
            rows="3"
            placeholder="Medidas tomadas para evitar recorrência..."
          ></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Responsável pela Investigação</label>
          <input
            type="text"
            class="form-control"
            name="investigator"
            placeholder="Nome"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" name="status">
            <option value="open">Aberto</option>
            <option value="investigating">Em Investigação</option>
            <option value="closed">Encerrado</option>
          </select>
        </div>
      </div>
    </template>

    <div
      class="toast-container"
      id="toastContainer"
      aria-live="polite"
      role="status"
    ></div>
    <div
      class="modal-backdrop hidden"
      id="modalBackdrop"
      aria-hidden="true"
    ></div>
    <div class="global-loader hidden" id="globalLoader">
      <div class="spinner"></div>
    </div>

    <script type="module" src="assets/js/incidentes.js"></script>
  </body>
</html>
