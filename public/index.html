<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | CMV Contabilidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
  </head>
  <body class="app-layout">
    <a href="#mainContent" class="skip-link">Ir para o conteúdo principal</a>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"
              />
            </svg>
          </div>
          <span class="brand-name">CMV Contabilidade</span>
        </div>
        <button
          class="sidebar-close-btn"
          id="sidebarClose"
          aria-label="Fechar menu"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="20"
            height="20"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebarUser"></div>
      </div>
    </aside>

    <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

    <div class="main-wrapper" id="mainWrapper">
      <header class="topbar">
        <div class="topbar-left">
          <button
            class="topbar-menu-btn icon-btn"
            id="topbarMenuBtn"
            aria-label="Menu"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="20"
              height="20"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
        </div>
        <div class="topbar-right">
          <div class="topbar-user" id="topbarUser"></div>
        </div>
      </header>

      <main class="main-content" id="mainContent">
        <!-- Cabeçalho da página -->
        <div class="page-header">
          <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Visão geral do sistema SST/RH – NR-1</p>
          </div>
          <div style="display: flex; gap: var(--sp-3)">
            <a href="relatorios.html" class="btn btn-secondary">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="18" y1="20" x2="18" y2="10" />
                <line x1="12" y1="20" x2="12" y2="4" />
                <line x1="6" y1="20" x2="6" y2="14" />
              </svg>
              Relatórios
            </a>
          </div>
        </div>

        <!-- Cards de estatísticas -->
        <div class="stats-grid" id="statsGrid">
          <!-- Skeleton loading -->
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>

        <!-- Linha de gráficos -->
        <div class="dashboard-grid-2" style="margin-bottom: var(--sp-6)">
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Riscos por Nível</div>
                <div class="card-subtitle">
                  Distribuição do inventário de riscos
                </div>
              </div>
            </div>
            <div class="card-body" id="riskChart">
              <div
                class="skeleton skeleton-text"
                style="height: 20px; margin-bottom: 12px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="height: 20px; margin-bottom: 12px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="height: 20px; margin-bottom: 12px"
              ></div>
              <div class="skeleton skeleton-text" style="height: 20px"></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Status das Ações (GRO)</div>
                <div class="card-subtitle">Plano de ação em andamento</div>
              </div>
            </div>
            <div class="card-body" id="actionChart">
              <div
                class="skeleton skeleton-text"
                style="height: 20px; margin-bottom: 12px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="height: 20px; margin-bottom: 12px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="height: 20px; margin-bottom: 12px"
              ></div>
            </div>
          </div>
        </div>

        <!-- Linha de listas rápidas -->
        <div class="dashboard-grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Ações com Vencimento Próximo</div>
              <a href="plano-acao.html" class="btn btn-link btn-sm"
                >Ver todas</a
              >
            </div>
            <div id="urgentActionsList">
              <div
                class="skeleton skeleton-text"
                style="margin: var(--sp-4) var(--sp-6); height: 16px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="margin: var(--sp-4) var(--sp-6); height: 16px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="margin: var(--sp-4) var(--sp-6); height: 16px"
              ></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-title">Treinamentos a Vencer (30 dias)</div>
              <a href="treinamentos.html" class="btn btn-link btn-sm"
                >Ver todos</a
              >
            </div>
            <div id="expiringTrainingsList">
              <div
                class="skeleton skeleton-text"
                style="margin: var(--sp-4) var(--sp-6); height: 16px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="margin: var(--sp-4) var(--sp-6); height: 16px"
              ></div>
              <div
                class="skeleton skeleton-text"
                style="margin: var(--sp-4) var(--sp-6); height: 16px"
              ></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div
      class="toast-container"
      id="toastContainer"
      aria-live="polite"
      role="status"
    ></div>
    <div class="modal-backdrop hidden" id="modalBackdrop"></div>
    <div class="global-loader hidden" id="globalLoader">
      <div class="spinner spinner-lg"></div>
    </div>

    <script type="module" src="assets/js/dashboard.js"></script>
  </body>
</html>
