<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treinamentos · CMV Contabilidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  </head>
  <body>
    <a href="#mainContent" class="skip-link">Ir para o conteúdo principal</a>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon"
            ><svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg
          ></span>
          <span class="brand-name">CMV Contabilidade</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user" id="sidebarUser"></div>
        </div>
        <button
          class="sidebar-close-btn"
          id="sidebarClose"
          aria-label="Fechar menu"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="20"
            height="20"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </aside>
      <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

      <div class="main-wrapper" id="mainWrapper">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-btn"
              id="topbarMenuBtn"
              aria-label="Menu"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <nav
              class="breadcrumb"
              id="breadcrumb"
              aria-label="Breadcrumb"
            ></nav>
          </div>
          <div class="topbar-right">
            <div class="topbar-user" id="topbarUser"></div>
          </div>
        </header>

        <main class="main-content" id="mainContent">
          <div class="page-header">
            <div>
              <h1 class="page-title">Treinamentos</h1>
              <p class="page-subtitle">
                Gestão de capacitações, reciclagens e controle de validade
              </p>
            </div>
            <div style="display: flex; gap: var(--sp-2)">
              <button class="btn btn-secondary" id="btnExport">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 16px; height: 16px"
                >
                  <path
                    d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"
                  />
                </svg>
                Exportar
              </button>
              <button class="btn btn-primary" id="btnNew">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 16px; height: 16px"
                >
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Novo Treinamento
              </button>
            </div>
          </div>

          <!-- Filtros -->
          <div class="card" style="margin-bottom: var(--sp-4)">
            <div class="card-body" style="padding: var(--sp-3)">
              <div
                class="form-grid"
                style="grid-template-columns: 2fr 1fr 1fr 1fr"
              >
                <div class="form-group" style="margin: 0">
                  <div class="input-wrapper">
                    <span class="input-icon"
                      ><svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <circle cx="11" cy="11" r="8" />
                        <path d="M21 21l-4.35-4.35" /></svg
                    ></span>
                    <input
                      type="text"
                      class="form-control"
                      id="searchInput"
                      placeholder="Pesquisar treinamentos..."
                    />
                  </div>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterCategory">
                    <option value="">Todas as Categorias</option>
                    <option value="nr">Norma Regulamentadora</option>
                    <option value="epi">EPI / EPC</option>
                    <option value="emergency">Emergência / Brigada</option>
                    <option value="operational">Operacional</option>
                    <option value="integration">Integração</option>
                    <option value="other">Outros</option>
                  </select>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterStatus">
                    <option value="">Todos os Status</option>
                    <option value="active">Ativo</option>
                    <option value="expired">Vencido</option>
                    <option value="expiring_soon">Vence em 30 dias</option>
                  </select>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterEstablishment">
                    <option value="">Todos os Estabelecimentos</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Tabela -->
          <div class="card">
            <div class="card-body" style="padding: 0">
              <div class="table-wrapper" id="tableWrapper"></div>
            </div>
            <div
              class="card-footer"
              id="paginationContainer"
              style="display: none"
            ></div>
          </div>
        </main>
      </div>
    </div>

    <!-- TEMPLATE MODAL -->
    <template id="tplModal">
      <div class="form-grid" style="gap: var(--sp-4)">
        <div style="grid-column: 1/-1">
          <p
            style="
              font-size: var(--text-sm);
              font-weight: var(--font-semi);
              color: var(--clr-text);
              border-bottom: 1px solid var(--clr-border);
              padding-bottom: var(--sp-2);
              margin-bottom: var(--sp-3);
            "
          >
            Dados do Treinamento
          </p>
        </div>

        <div class="form-group col-span-full">
          <label class="form-label">Nome do Treinamento *</label>
          <input
            type="text"
            class="form-control"
            name="trainingName"
            placeholder="Ex: NR-35 Trabalho em Altura, NR-06 EPI..."
          />
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Categoria *</label>
          <select class="form-control" name="category">
            <option value="">Selecione...</option>
            <option value="nr">Norma Regulamentadora</option>
            <option value="epi">EPI / EPC</option>
            <option value="emergency">Emergência / Brigada</option>
            <option value="operational">Operacional</option>
            <option value="integration">Integração</option>
            <option value="other">Outros</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Estabelecimento</label>
          <select
            class="form-control"
            name="establishmentId"
            id="trainModalEst"
          >
            <option value="">Todos / Geral</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Carga Horária (horas)</label>
          <input
            type="number"
            class="form-control"
            name="workload"
            min="1"
            placeholder="Ex: 8"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Validade (meses)</label>
          <input
            type="number"
            class="form-control"
            name="validityMonths"
            min="1"
            max="120"
            placeholder="Ex: 12"
          />
        </div>

        <div style="grid-column: 1/-1">
          <p
            style="
              font-size: var(--text-sm);
              font-weight: var(--font-semi);
              color: var(--clr-text);
              border-bottom: 1px solid var(--clr-border);
              padding-bottom: var(--sp-2);
              margin-bottom: var(--sp-3);
            "
          >
            Realização
          </p>
        </div>

        <div class="form-group">
          <label class="form-label">Data de Realização *</label>
          <input type="date" class="form-control" name="trainingDate" />
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Data de Vencimento</label>
          <input type="date" class="form-control" name="expirationDate" />
        </div>

        <div class="form-group">
          <label class="form-label">Instrutor / Empresa</label>
          <input
            type="text"
            class="form-control"
            name="instructor"
            placeholder="Nome do instrutor ou empresa"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Local</label>
          <input
            type="text"
            class="form-control"
            name="location"
            placeholder="Local de realização"
          />
        </div>

        <div class="form-group col-span-full">
          <label class="form-label">Observações</label>
          <textarea
            class="form-control"
            name="notes"
            rows="2"
            placeholder="Informações adicionais..."
          ></textarea>
        </div>
      </div>
    </template>

    <div
      class="toast-container"
      id="toastContainer"
      aria-live="polite"
      role="status"
    ></div>
    <div
      class="modal-backdrop hidden"
      id="modalBackdrop"
      aria-hidden="true"
    ></div>
    <div class="global-loader hidden" id="globalLoader">
      <div class="spinner"></div>
    </div>

    <script type="module" src="assets/js/treinamentos.js"></script>
  </body>
</html>
