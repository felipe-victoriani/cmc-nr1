<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuários · CMV Contabilidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  </head>
  <body>
    <a href="#mainContent" class="skip-link">Ir para o conteúdo principal</a>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon"
            ><svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg
          ></span>
          <span class="brand-name">CMV Contabilidade</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user" id="sidebarUser"></div>
        </div>
        <button
          class="sidebar-close-btn"
          id="sidebarClose"
          aria-label="Fechar menu"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="20"
            height="20"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </aside>
      <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

      <div class="main-wrapper" id="mainWrapper">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-btn"
              id="topbarMenuBtn"
              aria-label="Menu"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <nav
              class="breadcrumb"
              id="breadcrumb"
              aria-label="Breadcrumb"
            ></nav>
          </div>
          <div class="topbar-right">
            <div class="topbar-user" id="topbarUser"></div>
          </div>
        </header>

        <main class="main-content" id="mainContent">
          <div class="page-header">
            <div>
              <h1 class="page-title">Usuários do Sistema</h1>
              <p class="page-subtitle">
                Gerencie os acessos e perfis de usuário da plataforma
              </p>
            </div>
            <button class="btn btn-primary" id="btnNew">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="width: 16px; height: 16px"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Novo Usuário
            </button>
          </div>

          <!-- Filtros -->
          <div class="card" style="margin-bottom: var(--sp-4)">
            <div class="card-body" style="padding: var(--sp-3)">
              <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr">
                <div class="form-group" style="margin: 0">
                  <div class="input-wrapper">
                    <span class="input-icon"
                      ><svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <circle cx="11" cy="11" r="8" />
                        <path d="M21 21l-4.35-4.35" /></svg
                    ></span>
                    <input
                      type="text"
                      class="form-control"
                      id="searchInput"
                      placeholder="Pesquisar por nome ou e-mail..."
                    />
                  </div>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterRole">
                    <option value="">Todos os Perfis</option>
                    <option value="admin_master">Admin Master</option>
                    <option value="gestor_rh">Gestor RH</option>
                    <option value="gestor_unidade">Gestor de Unidade</option>
                    <option value="tecnico_sst">Técnico SST</option>
                    <option value="colaborador">Colaborador</option>
                  </select>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filterStatus">
                    <option value="">Todos os Status</option>
                    <option value="active">Ativo</option>
                    <option value="inactive">Inativo</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Tabela -->
          <div class="card">
            <div class="card-body" style="padding: 0">
              <div class="table-wrapper" id="tableWrapper"></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- TEMPLATE MODAL -->
    <template id="tplModal">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nome Completo *</label>
          <input type="text" class="form-control" name="nome" />
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">E-mail *</label>
          <input
            type="email"
            class="form-control"
            name="email"
            autocomplete="off"
          />
          <span class="form-error"></span>
        </div>

        <div class="form-group" id="passwordGroup">
          <label class="form-label">Senha *</label>
          <input
            type="password"
            class="form-control"
            name="password"
            autocomplete="new-password"
            placeholder="Mínimo 8 caracteres"
          />
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Perfil / Função *</label>
          <select class="form-control" name="tipo">
            <option value="">Selecione...</option>
            <option value="admin_master">Admin Master</option>
            <option value="gestor_rh">Gestor RH</option>
            <option value="gestor_unidade">Gestor de Unidade</option>
            <option value="tecnico_sst">Técnico SST</option>
            <option value="colaborador">Colaborador</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-group" id="companyGroup">
          <label class="form-label">Empresa *</label>
          <select class="form-control" name="companyId" id="userModalCompany">
            <option value="">Selecione a empresa...</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Estabelecimento</label>
          <select class="form-control" name="establishmentId" id="userModalEst">
            <option value="">Todos os estabelecimentos</option>
          </select>
        </div>

        <div class="form-group" id="statusGroup" style="display: none">
          <label class="form-label">Status</label>
          <select class="form-control" name="status">
            <option value="active">Ativo</option>
            <option value="inactive">Inativo</option>
          </select>
        </div>

        <div class="form-group col-span-full">
          <label class="form-label">Observações</label>
          <textarea class="form-control" name="notes" rows="2"></textarea>
        </div>

        <div
          class="form-group col-span-full"
          id="warningGroup"
          style="display: none"
        >
          <div class="alert alert-info">
            <strong>Nota:</strong> Editar usuário aqui atualiza apenas os dados
            cadastrais no banco. Para redefinir senha, o usuário deve usar
            "Esqueci minha senha".
          </div>
        </div>
      </div>
    </template>

    <div
      class="toast-container"
      id="toastContainer"
      aria-live="polite"
      role="status"
    ></div>
    <div
      class="modal-backdrop hidden"
      id="modalBackdrop"
      aria-hidden="true"
    ></div>
    <div class="global-loader hidden" id="globalLoader">
      <div class="spinner"></div>
    </div>

    <script type="module" src="assets/js/usuarios.js"></script>
  </body>
</html>
